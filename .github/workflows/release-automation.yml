name: Release Automation

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate release notes
      run: |
        # Extract changelog for this version
        VERSION=${{ github.ref_name }}
        sed -n "/## \[$VERSION\]/,/^## /p" CHANGELOG.md > release-notes-temp.md
        head -n -1 release-notes-temp.md > release-notes.md
        
        if [ ! -s release-notes.md ]; then
          echo "Using default release notes"
          cat > release-notes.md << EOF
# Release $VERSION

See [CHANGELOG.md](https://github.com/khoapvquocoai-rgb/china-search/blob/master/CHANGELOG.md) for detailed changes.

## Quick Start

\`\`\`bash
python scripts/generate_workflow_json.py --project "YourProject" --output workflow.json
\`\`\`

EOF
        fi
        
        cat release-notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release-notes.md
        generate_release_notes: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        # Only if setup.py or pyproject.toml exists
        if [ -f setup.py ] || [ -f pyproject.toml ]; then
          python -m build
          echo "Package built successfully"
        else
          echo "No package configuration found, skipping PyPI upload"
        fi
    
    - name: Upload to TestPyPI
      if: false  # Disable until package is ready
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: __token__
        repository_url: https://test.pypi.org/legacy/
      env:
        TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
